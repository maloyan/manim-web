<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MathTex pre-scale + Create MRE</title>
</head>
<body>
  <div id="container"></div>
  <button id="playBtn">Play</button>
  <button id="resetBtn">Reset</button>

  <script type="module">
    import { Scene, MathTex, Create } from '../src/index.ts';

    const container = document.getElementById('container');
    const scene = new Scene(container, {
      width: 1000,
      height: 500,
      backgroundColor: '#1a1a2e'
    });

    async function waitForReady(mob) {
      if (typeof mob.waitForRender === 'function') {
        await mob.waitForRender();
      }
    }

    async function logBox(label, mob) {
      try {
        await waitForReady(mob);
        const box = typeof mob.getBoundingBox === 'function' ? mob.getBoundingBox() : null;
        console.log(label, {
          box,
          scaleVector: mob.scaleVector
            ? [mob.scaleVector.x, mob.scaleVector.y, mob.scaleVector.z]
            : null,
          center: typeof mob.getCenter === 'function' ? mob.getCenter() : null,
        });
      } catch (err) {
        console.error(label, 'render failed:', err);
      }
    }

    document.getElementById('playBtn').addEventListener('click', async () => {
      scene.clear();

      // Baseline MathTex (no scale)
      const baseline = new MathTex({ latex: 'x^2', color: '#ddddff' });
      baseline.moveTo([-2, 0, 0]);
      scene.add(baseline);

      // Interesting case: pre-scale + Create (orange)
      const preScaledCreate = new MathTex({ latex: 'x^2', color: '#ffaa66' });
      preScaledCreate.scale(2);
      preScaledCreate.moveTo([2, 0, 0]);
      scene.add(preScaledCreate);

      await scene.play(new Create(preScaledCreate));

      await Promise.all([
        logBox('baseline', baseline),
        logBox('preScaledCreate', preScaledCreate),
      ]);

      console.log('Expected: orange should be ~2x blue baseline.');
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      scene.clear();
    });
  </script>
</body>
</html>
