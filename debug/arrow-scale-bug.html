<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Arrow Scale Bug</title>
  <style>
    body { margin: 0; background: #101319; display: flex; flex-direction: column; align-items: center; padding: 20px; font-family: monospace; color: #ccc; }
    #container { border: 1px solid #333; }
    .controls { margin-top: 12px; display: flex; gap: 8px; }
    button { padding: 8px 16px; background: #2563eb; border: none; border-radius: 4px; color: white; cursor: pointer; }
    button:hover { background: #3b82f6; }
    #log { margin-top: 12px; font-size: 12px; white-space: pre; background: #1a1f29; padding: 10px; border-radius: 4px; min-width: 500px; }
  </style>
</head>
<body>
  <div id="container"></div>
  <div class="controls">
    <button id="playBtn">Play</button>
    <button id="resetBtn">Reset</button>
  </div>
  <div id="log"></div>

  <script type="module" src="./arrow-scale-bug.ts"></script>
</body>
</html>
