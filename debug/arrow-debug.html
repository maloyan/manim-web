<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arrow Debug</title>
</head>
<body>
  <div id="container"></div>
  <button id="playBtn">Play</button>
  <button id="resetBtn">Reset</button>

  <script type="module">
    import { Scene, Arrow, ORIGIN, RIGHT } from '../src/index.ts';

    const container = document.getElementById('container');
    const scene = new Scene(container, {
      width: 800,
      height: 450,
      backgroundColor: '#1a1a2e'
    });

    document.getElementById('playBtn').addEventListener('click', async () => {
      scene.clear();
      const radius = 2.6;
      const arrow = new Arrow({
        start: [0, 0, 0],
        end: [radius, 0, 0],
        color: '#7dd3fc',
        strokeWidth: 3,
      });

      // Setup: grow (just adds to scene), shift, scale (no animation)
      scene.add(arrow);

      // Shift outward by +1 unit
      arrow.putStartAndEndOn([1, 0, 0], [radius + 1, 0, 0]);

      // Scale (no animate)
      arrow.scale(0.5);

      console.log('Before rotate:', arrow.getStart(), arrow.getEnd());

      // Play rotate
      await scene.play(arrow.animate.rotate(Math.PI).withDuration(2.5));

      console.log('After rotate:', arrow.getStart(), arrow.getEnd());
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      scene.clear();
    });
  </script>
</body>
</html>
