<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Square Rotate Direct</title>
</head>
<body>
  <div id="container"></div>
  <button id="playBtn">Rotate (no anim)</button>
  <button id="resetBtn">Reset</button>

  <script type="module">
    import { Scene, Square } from '../src/index.ts';

    const container = document.getElementById('container');
    const scene = new Scene(container, {
      width: 800,
      height: 450,
      backgroundColor: '#1a1a2e'
    });

    document.getElementById('playBtn').addEventListener('click', async () => {
      scene.clear();
      const square = new Square(2, { color: '#7dd3fc' });

      // Add to scene
      scene.add(square);

      console.log('Before rotate:', { rotation: square.rotation.toArray() });
      await scene.play(square.animate.rotate(Math.PI / 4).withDuration(1));
      console.log('After rotate:', { rotation: square.rotation.toArray() });
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      scene.clear();
    });
  </script>
</body>
</html>
