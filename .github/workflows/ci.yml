name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-package-lock
      - name: ESLint (errors block, warnings tracked)
        run: npx eslint src/ --max-warnings 0

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-package-lock
      - name: TypeScript type checking
        run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-package-lock
      - name: Run tests with coverage
        run: npx vitest run --coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}

  dead-exports:
    name: Dead exports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-package-lock
      - name: Check for dead exports (knip)
        run: npx knip

  circular-deps:
    name: Circular imports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-package-lock
      - name: Check for circular imports (madge)
        run: npx madge --circular --extensions ts src/

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-package-lock
      - name: Check formatting
        run: npm run format:check

  docs-build:
    name: Docs build (verify typia transform)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install root dependencies
        run: npm ci
      - name: Build manim-web library (applies typia transform)
        run: npm run build
      - name: Generate example docs
        run: node scripts/generate-example-docs.mjs
      - name: Install docs dependencies
        run: npm ci
        working-directory: docs
      - name: Build Docusaurus site
        run: npm run build
        working-directory: docs
      - name: Assert typia transform applied in docs bundle
        run: bash scripts/assert-docs-typia-transform.sh
