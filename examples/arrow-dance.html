<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arrow Dance</title>
    <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0b0f14;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
    }
    #container {
      border: 2px solid #253041;
      border-radius: 8px;
      overflow: hidden;
    }
    .controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
    }
    button {
      padding: 10px 20px;
      background: #2563eb;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #3b82f6;
    }
    </style>
  </head>
  <body>
    <div id="container"></div>
    <div class="controls">
      <button id="playBtn">Play Arrow Dance</button>
      <button id="resetBtn">Reset</button>
    </div>

    <script type="module" src="./arrow-dance.ts"></script>
  </body>
</html>
