<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ManimWeb - Split Screen Camera Example</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
    }
    #container {
      border: 2px solid #333;
      border-radius: 8px;
      overflow: hidden;
    }
    .controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
    }
    button {
      padding: 10px 20px;
      background: #e94560;
      border: none;
      border-radius: 4px;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #ff6b6b;
    }
  </style>
</head>
<body>
  <div id="container"></div>
  <div class="controls">
    <button id="playBtn">Play Animation</button>
    <button id="resetBtn">Reset</button>
  </div>

  <script type="module">
    import {
      Scene,
      Circle,
      Square,
      Create,
      MappingCamera,
      SplitScreenCamera,
    } from '../src/index.ts';

    const container = document.getElementById('container');
    const scene = new Scene(container, {
      width: 800,
      height: 450,
      backgroundColor: '#1a1a2e'
    });

    document.getElementById('playBtn').addEventListener('click', async () => {
      scene.clear();

      // Demonstrate MappingCamera: apply a coordinate transform
      const mappingCam = new MappingCamera({
        mappingFunction: (point) => [point[0] * 1.5, point[1] * 0.8, point[2]],
      });

      // Demonstrate SplitScreenCamera: two side-by-side views
      const splitCam = new SplitScreenCamera({
        split: 'horizontal',
        splitRatio: 0.5,
      });

      // Create shapes visible in both views
      const circle = new Circle({ radius: 1, color: '#e94560', strokeWidth: 4 });
      const square = new Square({ sideLength: 1.5, color: '#0f3460', strokeWidth: 4 });
      square.shift([3, 0, 0]);

      scene.add(circle);
      scene.add(square);

      await scene.play(new Create(circle));
      await scene.play(new Create(square));

      // Move the left camera to zoom in on the circle
      splitCam.getLeftCamera().moveTo([0, 0, 10]);

      // Move the right camera to focus on the square
      splitCam.getRightCamera().moveTo([3, 0, 10]);

      await scene.wait(1);
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      scene.clear();
    });
  </script>
</body>
</html>
