<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
    if (new URLSearchParams(location.search).has('embed')) {
      document.documentElement.classList.add('embed');
    }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ManimWeb - ReplacementTransform vs Transform</title>
    <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #1a1a2e;
      color: #eaeaea;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      gap: 16px;
      padding: 24px;
    }
    #container {
      border: 2px solid #333;
      border-radius: 8px;
      overflow: hidden;
    }
    .controls {
      display: flex;
      gap: 10px;
    }
    button {
      padding: 10px 20px;
      background: #e94560;
      border: none;
      border-radius: 4px;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #ff6b6b;
    }
    button:disabled {
      background: #666;
      cursor: not-allowed;
    }
    #status {
      font-size: 13px;
      font-family: ui-monospace, monospace;
      max-width: 800px;
      white-space: pre-wrap;
    }
    html.embed,
    html.embed body {
      margin: 0!important;
      padding: 0!important;
      overflow: hidden;
      background: #000!important;
      width: 100%;
      height: 100%;
    }
    html.embed body {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    html.embed .controls,
    html.embed h1,
    html.embed #status {
      display: none!important;
    }
    html.embed #container {
      border: none!important;
      border-radius: 0!important;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    </style>
  </head>
  <body>
    <h1>ReplacementTransform vs Transform (issue #308)</h1>
    <div id="container"></div>
    <div class="controls">
      <button id="playBtn">Play</button>
      <button id="resetBtn">Reset</button>
    </div>
    <pre id="status">Press Play. After each animation the scene's mobject set is logged.</pre>
    <script type="module" src="./replacement_transform.ts"></script>
  </body>
</html>
