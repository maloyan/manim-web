<!DOCTYPE html>
<html lang="en">
<head>
  <script>if(new URLSearchParams(location.search).has('embed'))document.documentElement.classList.add('embed')</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ManimWeb - Transform Mismatch (7 → 0)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
    }
    #container {
      border: 2px solid #333;
      border-radius: 8px;
      overflow: hidden;
    }
    .controls {
      margin-top: 20px;
      display: flex;
      gap: 10px;
    }
    button {
      padding: 10px 20px;
      background: #e94560;
      border: none;
      border-radius: 4px;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #ff6b6b; }
    button:disabled { background: #666; cursor: not-allowed; }
    html.embed, html.embed body { margin:0!important;padding:0!important;overflow:hidden;background:#000!important;width:100%;height:100%; }
    html.embed body { display:flex;justify-content:center;align-items:center; }
    html.embed .controls { display:none!important; }
    html.embed #container { border:none!important;border-radius:0!important;width:100vw;height:100vh;display:flex;justify-content:center;align-items:center; }
  </style>
</head>
<body>
  <div id="container"></div>
  <div class="controls">
    <button id="playBtn">Play Animation</button>
    <button id="resetBtn">Reset</button>
  </div>

  <script type="module">
    import { Scene, MathTex, Transform, FadeIn, BLACK, WHITE } from '../src/index.ts';

    const container = document.getElementById('container');
    const scene = new Scene(container, {
      width: 800,
      height: 450,
      backgroundColor: BLACK,
    });

    let isAnimating = false;

    async function playDemo() {
      scene.clear();

      const seven = new MathTex({ latex: '7', color: WHITE });
      const zero = new MathTex({ latex: '0', color: WHITE });

      await Promise.all([seven.waitForRender(), zero.waitForRender()]);

      seven.scale(4);
      zero.scale(4);

      await scene.play(new FadeIn(seven, { duration: 0.5 }));
      await scene.wait(0.4);
      await scene.play(new Transform(seven, zero, { duration: 2.0 }));

      // Ensure final state is the exact target geometry and metadata
      seven.setPoints(zero.getPoints().map((p) => [...p]));
      seven.setTransformSubpathLengths(zero.getEffectiveSubpathLengths?.());
      seven.opacity = zero.opacity;
      seven.color = zero.color;

      await scene.wait(1.0);
    }

    document.getElementById('playBtn').addEventListener('click', async () => {
      if (isAnimating) return;
      isAnimating = true;
      document.getElementById('playBtn').disabled = true;

      await playDemo();

      isAnimating = false;
      document.getElementById('playBtn').disabled = false;
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      scene.clear();
    });

    if (new URLSearchParams(window.location.search).has('embed')) {
      setTimeout(() => document.getElementById('playBtn').click(), 500);
    }
  </script>
</body>
</html>
